# This file was auto-generated by the Firebase CLI but updated for Flutter
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the code
      - uses: actions/checkout@v4

      # 2. Setup the Flutter environment
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # Speeds up future builds

      # 3. Build the Flutter Web project
      - run: flutter pub get
      - run: flutter build web --release

      # 4. Deploy the build/web folder to Firebase
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEBATEFLOW_14CE8 }}
          channelId: live
          projectId: debateflow-14ce8